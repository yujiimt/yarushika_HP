<head>

<style>
:root {
  --ivory: #f5f2ed;
  --charcoal: #1c1c1c;
  --graphite: #2d2d2d;
  --stone: #8a847c;
  --mist: #b5afa7;
  --accent: #b8432f;
  --accent-glow: rgba(184,67,47,0.08);
  --teal: #1a6b5a;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  height: 100%;
  overflow: hidden;
}

body {
  background: var(--ivory);
  color: var(--charcoal);
  font-family: 'Syne', 'Zen Kaku Gothic New', sans-serif;
  -webkit-font-smoothing: antialiased;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}

/* Grain */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 100;
  opacity: 0.03;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
}

/* Background orbs */
.orb {
  position: absolute;
  border-radius: 50%;
  pointer-events: none;
  filter: blur(80px);
}

.orb-1 {
  width: 500px; height: 500px;
  top: -10%; right: -5%;
  background: radial-gradient(circle, rgba(184,67,47,0.07) 0%, transparent 70%);
  animation: float1 20s ease-in-out infinite;
}

.orb-2 {
  width: 400px; height: 400px;
  bottom: -10%; left: -5%;
  background: radial-gradient(circle, rgba(26,107,90,0.06) 0%, transparent 70%);
  animation: float2 24s ease-in-out infinite;
}

.orb-3 {
  width: 250px; height: 250px;
  top: 30%; left: 15%;
  background: radial-gradient(circle, rgba(181,175,167,0.08) 0%, transparent 70%);
  animation: float3 18s ease-in-out infinite;
}

@keyframes float1 {
  0%, 100% { transform: translate(0, 0); }
  33% { transform: translate(-30px, 20px); }
  66% { transform: translate(20px, -15px); }
}

@keyframes float2 {
  0%, 100% { transform: translate(0, 0); }
  33% { transform: translate(25px, -20px); }
  66% { transform: translate(-15px, 25px); }
}

@keyframes float3 {
  0%, 100% { transform: translate(0, 0); }
  50% { transform: translate(20px, 20px); }
}

/* Decorative lines */
.deco-line {
  position: absolute;
  background: rgba(28,28,28,0.04);
}

.deco-line-v {
  width: 1px;
  height: 100%;
  top: 0;
}

.deco-line-v:nth-child(1) { left: 25%; }
.deco-line-v:nth-child(2) { left: 50%; }
.deco-line-v:nth-child(3) { left: 75%; }

/* Main container */
.container {
  text-align: center;
  position: relative;
  z-index: 10;
  padding: 40px;
  max-width: 720px;
}

/* Logo */
.logo {
  font-family: 'Zen Kaku Gothic New', sans-serif;
  font-weight: 900;
  font-size: 24px;
  letter-spacing: 0.05em;
  margin-bottom: 64px;
  opacity: 0;
  animation: fadeUp 0.8s 0.2s forwards;
}

.logo .dot { color: var(--accent); }

/* Status badge */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 8px 20px;
  border: 1px solid rgba(28,28,28,0.08);
  border-radius: 100px;
  background: rgba(255,255,255,0.5);
  backdrop-filter: blur(12px);
  margin-bottom: 40px;
  opacity: 0;
  animation: fadeUp 0.8s 0.4s forwards;
}

.badge-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--accent);
  position: relative;
}

.badge-dot::after {
  content: '';
  position: absolute;
  inset: -3px;
  border-radius: 50%;
  border: 1px solid var(--accent);
  opacity: 0;
  animation: ping 2s ease-out infinite;
}

.badge-text {
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--stone);
}

@keyframes ping {
  0% { opacity: 0.6; transform: scale(1); }
  100% { opacity: 0; transform: scale(2.5); }
}

/* Main heading */
.heading {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 700;
  font-size: clamp(40px, 6vw, 72px);
  line-height: 1.2;
  letter-spacing: -0.02em;
  margin-bottom: 24px;
  opacity: 0;
  animation: fadeUp 0.8s 0.6s forwards;
}

.heading em {
  font-style: italic;
  color: var(--accent);
}

/* Sub text */
.sub {
  font-family: 'Zen Kaku Gothic New', sans-serif;
  font-weight: 400;
  font-size: clamp(14px, 2vw, 17px);
  line-height: 2;
  color: var(--stone);
  margin-bottom: 56px;
  opacity: 0;
  animation: fadeUp 0.8s 0.8s forwards;
}

/* Divider */
.divider {
  width: 48px;
  height: 2px;
  background: var(--accent);
  margin: 0 auto 56px;
  opacity: 0;
  animation: fadeUp 0.8s 0.9s forwards;
}

/* Services tags */
.tags {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 10px;
  margin-bottom: 56px;
  opacity: 0;
  animation: fadeUp 0.8s 1s forwards;
}

.tag {
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.06em;
  padding: 8px 20px;
  border-radius: 100px;
  border: 1px solid rgba(28,28,28,0.08);
  color: var(--stone);
  background: rgba(255,255,255,0.4);
  backdrop-filter: blur(8px);
  transition: all 0.3s;
}

.tag:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--accent-glow);
}

/* Contact */
.contact {
  opacity: 0;
  animation: fadeUp 0.8s 1.1s forwards;
}

.contact-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--mist);
  margin-bottom: 10px;
}

.contact-email {
  font-family: 'Cormorant Garamond', serif;
  font-size: 20px;
  font-weight: 600;
  color: var(--charcoal);
  text-decoration: none;
  position: relative;
  transition: color 0.3s;
}

.contact-email::after {
  content: '';
  position: absolute;
  bottom: -2px; left: 0;
  width: 100%; height: 1px;
  background: var(--accent);
  transform: scaleX(0);
  transform-origin: right;
  transition: transform 0.4s cubic-bezier(0.25,1,0.5,1);
}

.contact-email:hover { color: var(--accent); }
.contact-email:hover::after { transform: scaleX(1); transform-origin: left; }

/* Footer */
.footer {
  position: absolute;
  bottom: 32px;
  left: 0; right: 0;
  text-align: center;
  font-size: 11px;
  color: var(--mist);
  letter-spacing: 0.08em;
  opacity: 0;
  animation: fadeUp 0.8s 1.3s forwards;
}

/* Animations */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Responsive */
@media (max-width: 600px) {
  .container { padding: 32px 24px; }
  .logo { font-size: 18px; margin-bottom: 48px; }
  .heading { margin-bottom: 20px; }
  .tags { gap: 8px; }
  .tag { font-size: 11px; padding: 6px 14px; }
}
</style>
</head>
